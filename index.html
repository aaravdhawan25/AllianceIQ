<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta Blink | Selection Scout</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 8px; }
        input, button { padding: 10px; margin: 5px; border-radius: 4px; border: none; }
        button { background: #ff5e00; color: white; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        th { background: #444; }
        .rank-1 { background: gold; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>FTC Elimination Scout</h2>
        <p>Analyze team performance for Alliance Selection.</p>
        
        <input type="text" id="apiKey" placeholder="Base64 API Token">
        <input type="number" id="season" value="2025" placeholder="Season (e.g. 2025)">
        <input type="text" id="eventCode" placeholder="Event Code (e.g. USNJCMP)">
        <button onclick="runScout()">Scout</button>

        <div id="status"></div>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Pick Rank</th>
                    <th>Team #</th>
                    <th>Avg RP</th>
                    <th>Avg Auto</th>
                    <th>Score Index</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <script src="scout.js"></script>
</body>
</html>
